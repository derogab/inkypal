name: CI and Release

on:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run syntax checks
        run: python -m compileall src/inkypal tests

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

  build-dist:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tool
        run: python -m pip install build

      - name: Build source and wheel distributions
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-binary-linux:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_name: inkypal-linux-x86_64
          - platform: linux/arm64
            artifact_name: inkypal-linux-aarch64
          - platform: linux/arm/v7
            artifact_name: inkypal-linux-armv7
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build emulated executable
        run: |
          mkdir -p dist
          docker run --rm --platform "${{ matrix.platform }}" \
            -v "$PWD:/work" -w /work \
            python:3.13-bookworm bash -lc '
              apt-get update &&
              apt-get install -y gcc &&
              python -m pip install --upgrade pip &&
              python -m pip install -r requirements.txt pyinstaller &&
              pyinstaller --clean --onefile --name inkypal --paths src src/inkypal/__main__.py &&
              cp dist/inkypal /work/dist/${{ matrix.artifact_name }}
            '

      - name: Upload emulated executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs:
      - build-dist
      - build-binary-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Ensure executables stay executable
        run: chmod +x release-assets/inkypal-linux-*/* || true

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes \
            release-assets/python-dist/* \
            release-assets/inkypal-linux-x86_64/* \
            release-assets/inkypal-linux-aarch64/* \
            release-assets/inkypal-linux-armv7/*
