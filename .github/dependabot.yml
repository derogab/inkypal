version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'master'
    schedule:
      interval: 'monthly'
    assignees:
      - 'derogab'
    cooldown:
      default-days: 7

  # Maintain dependencies for PIP
  - package-ecosystem: 'pip'
    directory: '/'
    target-branch: 'master'
    schedule:
      interval: 'weekly'
    assignees:
      - 'derogab'
    cooldown:
      default-days: 7
